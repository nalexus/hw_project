# Paths in this file are resolved relative to config/model/.

# Root directory for the provided labeled dataset.
dataset_dir: ../../data/dataset

# Label reserved for out-of-distribution documents and deferred predictions.
other_label: other

# Reviewed exact and near-duplicate exclusions within the known-class dataset.
exclusions_config_path: excluded_files.yaml

# Tokenization and empirical document-length bucket rules.
text_config_path: text.yaml

# Candidate TF-IDF and logistic-regression configurations for cross-validation.
candidates_config_path: candidates.yaml

# Directory where selected model runs are written.
runs_dir: ../../best_pipeline_search_runs

# Fraction of each known class reserved for final testing.
test_frac: 0.15

# Shared reproducibility seed for splitting, CV, and model fitting.
random_state: 42

# Number of stratified folds used to compare candidate model configs.
cv_folds: 3

# Optional cap on candidate configs considered; null means use the full search space.
candidate_limit: null

# Whether this run should become the single *_PROD serving run.
promote_selected: false

# Optional run folder prefix; null uses the default timestamped name.
run_name: null
